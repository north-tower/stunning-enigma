services:
  sales-agent-backend:
    container_name: sales-agent-backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5601:5601"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5601
      DATABASE_URL: postgresql://${POSTGRES_USER:-play_user}:${POSTGRES_PASSWORD:-play_password}@sales-agent-db:5432/${POSTGRES_DB:-play}
    depends_on:
      sales-agent-db:
        condition: service_healthy
      sales-agent-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  sales-agent-migrate:
    container_name: sales-agent-migrate
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-play_user}:${POSTGRES_PASSWORD:-play_password}@sales-agent-db:5432/${POSTGRES_DB:-play}
    depends_on:
      sales-agent-db:
        condition: service_healthy
    command: ["pnpm", "migration:run:dist"]
    restart: "no"

  sales-agent-db:
    image: postgres:16-alpine
    container_name: sales-agent-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-play}
      POSTGRES_USER: ${POSTGRES_USER:-play_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-play_password}
    volumes:
      - sales-agent-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-play_user} -d ${POSTGRES_DB:-play}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  sales-agent-db-data:
